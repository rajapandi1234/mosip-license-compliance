name: MOSIP LICENSE COMPLIANCE

on:
  workflow_dispatch:
    inputs:
      image_name:
        description: "Docker image name (e.g., mosip/registration-service)"
        required: true
        type: string
      image_tag:
        description: "Docker image tag (e.g., 1.3.0)"
        required: true
        type: string

jobs:
  compliance:
    runs-on: ubuntu-latest

    steps:
      - name: Pull Docker Image
        run: |
          docker pull "${{ github.event.inputs.image_name }}:${{ github.event.inputs.image_tag }}"

      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: Generate Raw SBOM
        run: |
          syft "${{ github.event.inputs.image_name }}:${{ github.event.inputs.image_tag }}" \
            -o json > sbom-raw.json

      - name: Run MOSIP License Compliance Engine
        run: |
          cat > compliance_engine.py << 'EOF'
          import json
          import re
          import os
          import urllib.request

          with open("sbom-raw.json") as f:
              sbom = json.load(f)

          # ==============================
          # MOSIP POLICY (MPL-2.0 based)
          # ==============================

          ALLOWED = {
              "BSD-2-Clause",
              "BSD-3-Clause",
              "MIT",
              "Apache-2.0",
              "MPL-2.0",
              "ISC",
              "Python-2.0",
              "AFL-2.1",
              "CDDL-1.0",
              "Unicode-DFS-2016",
              "BlueOak-1.0.0",
              "OFL-1.1",
              "Zlib",
              "0BSD",
          }

          DISALLOWED = {
              "EPL-1.0",
              "EPL-2.0",
              "GPL-2.0",
              "GPL-2.0-only",
              "LGPL-3.0",
              "AGPL-3.0",
              "AFL-2.0",
              "ODC-By-1.0",
              "CC-BY-4.0",
          }

          NOTICE_REQUIRED = {
              "Apache-2.0",
              "CDDL-1.0",
          }

          def extract_spdx_list(expression):
              if not expression:
                  return []
              expression = expression.replace("(", "").replace(")", "")
              parts = re.split(r"\s+OR\s+|\s+AND\s+", expression)
              return [p.strip() for p in parts]

          def choose_license(expression):
              if not expression:
                  return None, "NO_LICENSE_FOUND"

              licenses = extract_spdx_list(expression)

              if " OR " in expression:
                  for lic in licenses:
                      if lic in ALLOWED:
                          return lic, "SELECTED_FROM_OR"
                  return None, "NO_COMPATIBLE_OPTION"

              if " AND " in expression:
                  for lic in licenses:
                      if lic in DISALLOWED:
                          return None, "AND_CONTAINS_DISALLOWED"
                  return expression, "AND_ALL_ALLOWED"

              lic = licenses[0]
              if lic in ALLOWED:
                  return lic, "SINGLE_ALLOWED"
              if lic in DISALLOWED:
                  return None, "SINGLE_DISALLOWED"

              return None, "UNKNOWN_LICENSE"

          os.makedirs("licenses", exist_ok=True)

          third_party = []
          unique_licenses = set()
          non_compliant = []

          for comp in sbom.get("artifacts", []):
              spdx_expression = None

              for lic in comp.get("licenses", []):
                  if lic.get("spdxExpression"):
                      spdx_expression = lic["spdxExpression"]
                      break

              selected_license, status = choose_license(spdx_expression)

              if selected_license:
                  comp["licenses"] = [{"license": {"id": selected_license}}]
                  if " AND " in selected_license:
                      for l in extract_spdx_list(selected_license):
                          unique_licenses.add(l)
                  else:
                      unique_licenses.add(selected_license)
              else:
                  comp["licenses"] = []
                  non_compliant.append({
                      "name": comp.get("name"),
                      "version": comp.get("version"),
                      "license": spdx_expression,
                      "reason": status
                  })

              third_party.append({
                  "name": comp.get("name", "UNKNOWN"),
                  "version": comp.get("version", "UNKNOWN"),
                  "original_license": spdx_expression or "UNKNOWN",
                  "selected_license": selected_license or "NON-COMPLIANT",
                  "status": status
              })

          # Write cleaned SBOM
          with open("sbom-final.json", "w") as f:
              json.dump(sbom, f, indent=2)

          # THIRD-PARTY-NOTICES
          with open("THIRD-PARTY-NOTICES.txt", "w") as f:
              for e in third_party:
                  f.write("============================================================\n")
                  f.write(f"Package: {e['name']}\n")
                  f.write(f"Version: {e['version']}\n")
                  f.write(f"Original License: {e['original_license']}\n")
                  f.write(f"Selected License (MOSIP Policy): {e['selected_license']}\n")
                  f.write(f"Status: {e['status']}\n")
                  f.write("============================================================\n\n")

          # NOTICE file
          with open("NOTICE", "w") as notice:
              notice.write("This product includes third-party software components.\n\n")
              for e in third_party:
                  if e["selected_license"] in NOTICE_REQUIRED:
                      notice.write(f"{e['name']} ({e['version']}) - {e['selected_license']}\n")

          # Download License Texts from SPDX
          for lic in unique_licenses:
              try:
                  url = f"https://raw.githubusercontent.com/spdx/license-list-data/master/text/{lic}.txt"
                  path = f"licenses/{lic}.txt"
                  urllib.request.urlretrieve(url, path)
              except Exception:
                  print(f"⚠ Could not fetch text for {lic}")

          if non_compliant:
              print("\n❌ NON-COMPLIANT PACKAGES FOUND:\n")
              for item in non_compliant:
                  print(item)
              exit(1)

          print("\n✅ MOSIP License Compliance Passed\n")
          EOF

          python3 compliance_engine.py

      - name: Upload Compliance Bundle
        uses: actions/upload-artifact@v4
        with:
          name: mosip-license-compliance-bundle
          path: |
            sbom-final.json
            THIRD-PARTY-NOTICES.txt
            NOTICE
            licenses/
