name: License Compliance Engine

on:
  workflow_dispatch:
    inputs:
      image_name:
        description: "Docker image name"
        required: true
      image_tag:
        description: "Docker image tag"
        required: true
      policy_file:
        description: "Policy JSON path (e.g. policy/mosip-license-policy.json)"
        required: true

  workflow_call:
    inputs:
      image_name:
        required: true
        type: string
      image_tag:
        required: true
        type: string
      policy_file:
        required: true
        type: string

  pull_request:

jobs:
  compliance:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq python3

      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh
          sudo mv ./bin/syft /usr/local/bin/

      - name: Pull Docker Image
        if: ${{ inputs.image_name != '' }}
        run: |
          docker pull ${{ inputs.image_name }}:${{ inputs.image_tag }}

      - name: Generate SBOM (Image)
        if: ${{ inputs.image_name != '' }}
        run: |
          syft ${{ inputs.image_name }}:${{ inputs.image_tag }} -o json > sbom.json

      - name: Generate SBOM (Source)
        if: ${{ inputs.image_name == '' }}
        run: |
          syft dir:. -o json > sbom.json

      - name: Normalize Licenses
        run: |
          python3 scripts/clean_licenses.py sbom.json sbom-clean.json

      - name: Enforce Policy (Non-Blocking)
        run: |
          python3 scripts/enforce_policy.py sbom-clean.json ${{ inputs.policy_file || 'policy/mosip-license-policy.json' }}

      - name: Prepare Policy Alias
        run: |
          cp ${{ inputs.policy_file || 'policy/mosip-license-policy.json' }} policy.json

      - name: Generate Notices & License Bundle
        run: |
          python3 scripts/generate_notice.py

      - name: Generate License Count Report
        run: |
          python3 scripts/license_report.py sbom-clean.json license-report.txt

      - name: Upload Compliance Bundle
        uses: actions/upload-artifact@v4
        with:
          name: license-compliance-bundle
          path: |
            sbom-clean.json
            compliance-summary.txt
            license-report.txt
            THIRD-PARTY-NOTICES.txt
            NOTICE
            licenses/
